<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- RT-16: Referrer policy -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Student Login | Galala Uni</title>
  <meta name="description" content="Sign in to your Galala Uni student portal to access your dashboard, academic records, and campus tools." />
  <link href="../css/fonts/fonts.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <style>
    /* Hide native browser password reveal icons (Edge/Chrome) */
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear { display: none; }
    input[type="password"]::-webkit-reveal { display: none; }
  </style>
  <!-- Framekiller script to prevent clickjacking -->
  <style id="antiClickjack">body{display:none !important;}</style>
  <script type="text/javascript">
    if (self === top) {
        var antiClickjack = document.getElementById("antiClickjack");
        if (antiClickjack) antiClickjack.parentNode.removeChild(antiClickjack);
    } else {
        top.location = self.location;
    }
  </script>
</head>
<body>

  <div class="login-page-centered">

    <div class="login-float-card">

      <!-- Brand -->
      <div style="text-align:center;margin-bottom:var(--space-8);">
        <a href="../index.html" class="brand" style="display:inline-flex;justify-content:center;">
          <img src="../gu_logo.png" alt="Galala Uni Logo" class="brand-logo" style="height:36px; width:auto; border-radius:4px;" />
        </a>
      </div>

      <h1 class="login-form-title" style="text-align:center;">Welcome back.</h1>
      <p class="login-form-subtitle" style="text-align:center;margin-bottom:1.5rem;font-size:.875rem;line-height:1.5;">Use your Student ID and the temporary password sent to your email by Galala IAAS. After entering them, you will receive a one-time verification code by email.</p>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label class="form-label" for="student-id">University ID</label>
          <input
            class="form-input"
            type="text"
            id="student-id"
            name="student_id"
            placeholder="e.g., 202100123"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative;">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              style="padding-right:3rem;"
              required
            />
            <button
              type="button"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--col-on-muted);"
              aria-label="Toggle password visibility"
              id="pwd-toggle"
            >
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
          </div>
        </div>


        <div id="login-error" style="display:none;padding:var(--space-3) var(--space-4);background:#fee2e2;border-radius:var(--radius-md);color:#991b1b;font-size:.875rem;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign In to Portal
        </button>
      </form>

      <!-- OTP Form (Hidden initially) -->
      <form class="login-form" id="otp-form" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="otp-code">Verification Code</label>
          <input
            class="form-input"
            type="text"
            id="otp-code"
            name="otp_code"
            placeholder="Enter 6-digit code"
            autocomplete="one-time-code"
            required
          />
        </div>

        <div id="otp-error" style="display:none;padding:var(--space-3) var(--space-4);background:#fee2e2;border-radius:var(--radius-md);color:#991b1b;font-size:.875rem;margin-bottom:var(--space-4);"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="verify-btn">
          Verify Code
        </button>
        <div style="text-align:center;margin-top:var(--space-4);">
          <button type="button" id="back-to-login" style="background:none;border:none;color:var(--col-primary);cursor:pointer;font-weight:600;font-size:.875rem;">&larr; Back to Login</button>
        </div>
      </form>


    </div>

  </div>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
