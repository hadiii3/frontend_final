<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Forgot Password | Galala Uni</title>
  <meta name="description" content="Reset your Galala Uni student portal password." />
  <link href="../css/fonts/fonts.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <!-- Framekiller -->
  <style id="antiClickjack">body{display:none !important;}</style>
  <script type="text/javascript">
    if (self === top) {
        var antiClickjack = document.getElementById("antiClickjack");
        if (antiClickjack) antiClickjack.parentNode.removeChild(antiClickjack);
    } else { top.location = self.location; }
  </script>
</head>
<body>

  <div class="login-page-centered">
    <div class="login-float-card">

      <!-- Brand -->
      <div style="text-align:center;margin-bottom:var(--space-6);">
        <a href="../index.html" class="brand" style="display:inline-flex;justify-content:center;">
          <img src="../gu_logo.png" alt="Galala Uni Logo" class="brand-logo" style="height:36px;width:auto;border-radius:4px;" />
        </a>
      </div>

      <h1 class="login-form-title" style="text-align:center;">Forgot Password</h1>
      <p class="login-form-subtitle" style="text-align:center;margin-bottom:1.5rem;font-size:.875rem;line-height:1.5;">
        Enter your university email address and we'll send you a verification code to reset your password.
      </p>

      <!-- Step 1: Email form -->
      <form id="forgot-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email">University Email</label>
          <input
            class="form-input"
            type="email"
            id="forgot-email"
            name="email"
            placeholder="you@galala.edu.eg"
            autocomplete="email"
            required
          />
        </div>

        <div id="forgot-error" style="display:none;padding:var(--space-3) var(--space-4);background:#fee2e2;border-radius:var(--radius-md);color:#991b1b;font-size:.875rem;margin-bottom:var(--space-4);"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="forgot-btn">
          Send Reset Code
        </button>
      </form>

      <!-- Success state (shown after submit regardless of whether email exists) -->
      <div id="forgot-success" style="display:none;padding:16px 18px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:var(--radius-md);color:#166534;font-size:.875rem;margin-bottom:var(--space-5);">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>If an account exists for that email, a password reset code has been sent. Check your inbox and proceed to reset your password.</span>
        </div>
        <a href="reset-password.html" id="goto-reset-link" style="display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-weight:600;color:#166534;text-decoration:underline;">
          Enter reset code
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </a>
      </div>

      <div style="text-align:center;margin-top:var(--space-5);font-size:.875rem;">
        <a href="login.html" style="color:var(--col-primary);text-decoration:none;font-weight:500;">&larr; Back to Login</a>
      </div>

    </div>
  </div>

  <script type="module" src="../js/forgot-password.js"></script>
</body>
</html>
